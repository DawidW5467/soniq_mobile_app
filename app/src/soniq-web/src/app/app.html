@let settings = 'main.settings' | translate;

<div class="player">
  @if (iconifyButtons()) {
    <fa-icon class="settings" [icon]="faGear" tabindex="0" role="button" [title]="settings" [attr.aria-label]="settings" (click)="openSettings()" />
  } @else {
    <span class="settings-text" tabindex="0" role="button" [title]="settings" [attr.aria-label]="settings" (click)="openSettings()">{{ settings }}</span>
  }
  <song-cover />
  <song-duration />
  <controls />
  <settings />
</div>
